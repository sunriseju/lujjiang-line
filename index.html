<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鷺江國小LINE公告查詢網</title>
    <style>
      :root {
        --primary-color: #2c3e50;
        --secondary-color: #3498db;
        --bg-color: #f4f7f6;
        --card-bg: #ffffff;
      }
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, '微軟正黑體';
        background-color: var(--bg-color);
        margin: 0;
        padding: 15px;
        color: #333;
      }
      .container {
        max-width: 1000px;
        margin: 0 auto;
        background-color: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      }
      h1 {
        text-align: center;
        color: var(--primary-color);
        margin-bottom: 20px;
        border-bottom: 3px solid var(--secondary-color);
        padding-bottom: 15px;
      }
      /* 1. 字體控制區塊改為置中 */
      .font-controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .font-label {
        font-size: 14px;
        color: #666;
      }
      .quick-tags {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .tag-btn {
        padding: 8px 16px;
        border: 1px solid var(--secondary-color);
        background-color: white;
        color: var(--secondary-color);
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: bold;
        transition: all 0.2s;
        white-space: nowrap;
      }
      .tag-btn:hover, .tag-btn.active {
        background-color: var(--secondary-color);
        color: white;
      }
      .tag-today { border-color: #e67e22; color: #e67e22; }
      .tag-today:hover, .tag-today.active { background-color: #e67e22; color: white; }
      .tag-clear { border-color: #95a5a6; color: #95a5a6; }
      .tag-clear:hover { background-color: #95a5a6; color: white; }
      
      .controls {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
        flex-wrap: wrap;
      }
      .search-box { flex: 2; min-width: 200px; }
      .sort-box { flex: 1; min-width: 150px; }
      input, select {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
        box-sizing: border-box;
      }
      
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
      th { background-color: var(--primary-color); color: white; font-weight: 500; }
      tr:hover { background-color: #f9fbfd; }

      .cat-tag {
        background-color: #eee;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 0.85em;
        display: inline-block;
      }
      .attachment-btn {
        display: inline-block;
        background-color: #ecf0f1;
        color: #2c3e50;
        padding: 6px 10px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 13px;
        margin-top: 5px;
        border: 1px solid #bdc3c7;
      }

      /* 2. 手機版排程優化 (RWD) */
      @media (max-width: 600px) {
        .container { padding: 15px; }
        .controls { flex-direction: column; }
        
        /* 強制將表格轉換為區塊，解決擠壓問題 */
        thead { display: none; } /* 手機版隱藏表頭 */
        tr {
          display: block;
          border-bottom: 2px solid var(--secondary-color);
          margin-bottom: 20px;
          padding-bottom: 10px;
        }
        td {
          display: block;
          width: 100% !important;
          padding: 8px 0;
          border: none;
          box-sizing: border-box;
        }
        td:before {
          content: attr(data-label);
          font-weight: bold;
          color: var(--secondary-color);
          display: block;
          font-size: 0.8em;
          margin-bottom: 2px;
        }
      }
      
      #loading { text-align: center; padding: 40px; font-size: 18px; color: #666; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🏫 鷺江國小LINE公告查詢網</h1>

      <div class="font-controls">
        <span class="font-label">字體控制：</span>
        <button class="tag-btn" onclick="changeFontSize(2)">➕ 放大</button>
        <button class="tag-btn" onclick="changeFontSize(-2)">➖ 縮小</button>
        <button class="tag-btn tag-clear" onclick="resetFontSize()">🔄 重設</button>
      </div>
      
      <div class="quick-tags" id="tagContainer">
        <button class="tag-btn tag-today" onclick="setFilter('今日公告', this)">🌟 今日公告</button>
        <button class="tag-btn" onclick="setFilter('教務處', this)">教務處</button>
        <button class="tag-btn" onclick="setFilter('學務處', this)">學務處</button>
        <button class="tag-btn" onclick="setFilter('總務處', this)">總務處</button>
        <button class="tag-btn" onclick="setFilter('輔導室', this)">輔導室</button>
        <button class="tag-btn" onclick="setFilter('人事室', this)">人事室</button>
        <button class="tag-btn" onclick="setFilter('會計室', this)">會計室</button>
        <button class="tag-btn tag-clear" onclick="setFilter('', this)">✖ 全部</button>
      </div>

      <div class="controls">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 搜尋關鍵字..." onkeyup="updateView()">
        </div>
        <div class="sort-box">
          <select id="sortSelect" onchange="updateView()">
            <option value="dateDesc">🕒 新 ➔ 舊</option>
            <option value="dateAsc">🕒 舊 ➔ 新</option>
            <option value="dept">🏢 處室排序</option>
          </select>
        </div>
      </div>

      <div id="loading">⏳ 正在連線至資料庫...</div>

      <table id="dataTable" style="display: none;">
        <thead>
          <tr>
            <th width="18%">發布日期</th>
            <th width="12%">處室</th>
            <th width="15%">類別</th>
            <th width="40%">公告內容</th>
            <th width="15%">附件</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <script>
      const apiUrl = "https://script.google.com/macros/s/AKfycbzm8-6q2efkwFgl7J2fJFJZ_vJzk6LQeMr5IXS7xQ5NlXprTacIXhQV6Lu0ewasan_unA/exec";
      let allData = []; 
      let activeDepartment = ""; 
      let currentFontSize = 16;

      window.onload = function() {
        fetch(apiUrl, { redirect: 'follow' })
          .then(res => res.json())
          .then(data => { initData(data); })
          .catch(err => { document.getElementById('loading').innerText = "❌ 載入失敗"; });
      };

      function changeFontSize(delta) {
        currentFontSize += delta;
        if (currentFontSize < 12) currentFontSize = 12;
        if (currentFontSize > 32) currentFontSize = 32;
        applyFontSize();
      }

      function resetFontSize() {
        currentFontSize = 16;
        applyFontSize();
      }

      function applyFontSize() {
        const tableBody = document.getElementById('tableBody');
        tableBody.style.fontSize = currentFontSize + 'px';
        const tds = tableBody.getElementsByTagName('td');
        for (let td of tds) {
          td.style.lineHeight = (currentFontSize * 1.5) + 'px';
        }
      }

      function initData(data) {
        allData = data;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dataTable').style.display = 'table';
        updateView(); 
      }

      function setFilter(type, btn) {
        activeDepartment = type;
        document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
        if(btn) btn.classList.add('active');
        updateView();
      }

      function updateView() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const sortType = document.getElementById('sortSelect').value;

        let filteredData = allData.filter(row => {
          if (!row.timestamp) return false;
          const safeDept = String(row.dept || "");
          const safeContent = String(row.content || "");
          const safeTimestamp = String(row.timestamp || "");

          if (activeDepartment === '今日公告') {
            const todayStr = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/-/g, '/');
            if (!safeTimestamp.startsWith(todayStr)) return false;
          } else if (activeDepartment !== "" && safeDept !== activeDepartment) {
            return false;
          }

          return (safeDept + safeContent).toLowerCase().includes(keyword);
        });

        filteredData.sort((a, b) => {
          if (sortType === 'dept') return a.dept.localeCompare(b.dept, 'zh-Hant');
          const tA = new Date(a.timestamp).getTime();
          const tB = new Date(b.timestamp).getTime();
          return sortType === 'dateDesc' ? tB - tA : tA - tB;
        });

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 

        filteredData.forEach(row => {
          const tr = document.createElement('tr');
          let fileHtml = '無附件';
          if (row.files) {
            fileHtml = row.files.split(',').map((l, i) => `<a href="${l.trim()}" target="_blank" class="attachment-btn">📄 附件 ${i+1}</a>`).join('<br>');
          }

          // 加入 data-label 讓手機版顯示標籤
          tr.innerHTML = `
            <td data-label="發布日期" style="color:#666;">${row.timestamp}</td>
            <td data-label="處室"><strong>${row.dept}</strong></td>
            <td data-label="類別"><span class="cat-tag">${row.category}</span></td>
            <td data-label="公告內容">${row.content.replace(/\n/g, '<br>')}</td>
            <td data-label="附件">${fileHtml}</td>
          `;
          tbody.appendChild(tr);
        });
        applyFontSize();
      }
    </script>
  </body>
</html>
